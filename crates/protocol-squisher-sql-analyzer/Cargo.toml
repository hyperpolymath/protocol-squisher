[package]
name = "protocol-squisher-sql-analyzer"
version = "1.1.0"
edition = "2021"
authors = ["Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"]
license = "PMPL-1.0-or-later"
description = "SQL DDL schema analyzer for Protocol Squisher — database schemas as data shapes"
repository = "https://github.com/hyperpolymath/protocol-squisher"
homepage = "https://github.com/hyperpolymath/protocol-squisher"
keywords = ["sql", "ddl", "schema", "database", "interop"]
categories = ["development-tools", "database", "parser-implementations"]

[dependencies]
protocol-squisher-ir = { path = "../protocol-squisher-ir" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
shape-ir = { path = "../shape-ir" }
