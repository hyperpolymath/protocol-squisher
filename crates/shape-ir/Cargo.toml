[package]
name = "shape-ir"
version = "0.1.0"
edition = "2021"
rust-version = "1.86"
license = "PMPL-1.0-or-later"
authors = ["Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"]
description = "Universal data shape intermediate representation — the algebra of data shape"
repository = "https://github.com/hyperpolymath/protocol-squisher"
keywords = ["shape", "ir", "algebra", "data", "morphism"]
categories = ["data-structures", "development-tools"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
protocol-squisher-ir = { path = "../protocol-squisher-ir" }

[dev-dependencies]
proptest = "1.11"
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "shape_benchmarks"
harness = false
